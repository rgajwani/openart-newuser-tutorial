<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenArt New User Tutorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS CUSTOM PROPERTIES ===== */
    :root {
      --bg: #090a0a;
      --surface: #141414;
      --surface-hover: #1e1e1e;
      --border: #2a2a2a;
      --text: #ffffff;
      --text-secondary: #b0b4ba;
      --text-muted: #6b7280;
      --green: #16d866;
      --green-glow: rgba(22, 216, 102, 0.15);
      --radius: 12px;
      --font-heading: 'Bricolage Grotesque', sans-serif;
      --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
      --left-pane-bg: #ffffff;
      --left-pane-text: #1a1a2e;
      --left-pane-text-secondary: #4a4a6a;
    }

    /* ===== RESET & BASE STYLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
    }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      font-weight: 700;
      line-height: 1.2;
      margin: 1.5em 0 0.75em 0;
    }

    h1 { font-size: 2.5rem; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
    h4 { font-size: 1.25rem; }

    p {
      margin-bottom: 1em;
      color: var(--text-secondary);
    }

    ul, ol {
      margin: 1em 0 1em 2em;
      color: var(--text-secondary);
    }

    li {
      margin-bottom: 0.5em;
    }

    strong {
      color: var(--text);
      font-weight: 600;
    }

    a {
      color: var(--green);
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover {
      color: #22e878;
    }

    /* ===== LAYOUT ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* TOP NAV BAR */
    nav.top-nav {
      background-color: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .nav-logo { order: 1; flex-shrink: 0; }
    .nav-tracks { order: 2; flex-shrink: 0; }
    .nav-search { order: 3; flex-shrink: 0; }
    .nav-modules { order: 4; flex-basis: 100%; }
    .nav-progress { order: 5; }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      min-width: fit-content;
    }

    .nav-logo span {
      color: var(--green);
    }

    .nav-tracks {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .track-tab {
      padding: 8px 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.2s;
      position: relative;
    }

    .track-tab:hover {
      border-color: var(--green);
      color: var(--text);
    }

    .track-tab.active {
      background-color: rgba(22, 216, 102, 0.15);
      color: var(--green);
      border-color: var(--green);
      font-weight: 600;
    }

    .track-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--green);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      text-transform: uppercase;
    }

    .nav-modules {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .module-tab {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.9rem;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .module-tab:hover {
      border-color: var(--green);
      color: var(--text);
    }

    .module-tab.active {
      background-color: var(--green);
      color: var(--bg);
      border-color: var(--green);
      font-weight: 600;
    }

    .module-tab .progress {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-left: 4px;
      display: none;
    }

    .nav-search {
      position: relative;
      min-width: 200px;
      max-width: 300px;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      background-color: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 2px var(--green-glow);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      z-index: 200;
      margin-top: -1px;
    }

    .search-results.active {
      display: block;
    }

    .search-result-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background-color 0.2s;
    }

    .search-result-item:hover {
      background-color: var(--surface-hover);
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-module {
      font-size: 0.75rem;
      color: var(--green);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .search-result-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .search-result-snippet {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .search-result-snippet .match {
      background-color: var(--green-glow);
      color: var(--green);
      padding: 0 2px;
      border-radius: 2px;
    }

    .nav-progress {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: fit-content;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .nav-progress-bar {
      width: 120px;
      height: 4px;
      background-color: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .nav-progress-fill {
      height: 100%;
      background-color: var(--green);
      transition: width 0.3s;
    }

    /* MAIN CONTENT CONTAINER */
    .content-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* LEFT PANE - TUTORIAL CONTENT */
    .left-pane {
      flex: 0 0 60%;
      overflow-y: auto;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      background-color: var(--left-pane-bg);
    }

    .toc-toggle {
      padding: 12px 24px;
      background-color: var(--left-pane-bg);
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--left-pane-text);
      transition: color 0.2s;
    }

    .toc-toggle:hover {
      color: var(--left-pane-text);
    }

    .toc-toggle svg {
      transition: transform 0.3s;
    }

    .toc-toggle.collapsed svg {
      transform: rotate(0deg);
    }

    .toc-toggle:not(.collapsed) svg {
      transform: rotate(180deg);
    }

    /* TABLE OF CONTENTS */
    .table-of-contents {
      padding: 24px;
      background-color: var(--left-pane-bg);
      border-bottom: 1px solid #e0e0e0;
      max-height: 300px;
      overflow-y: auto;
      transition: max-height 0.3s;
    }

    .table-of-contents.collapsed {
      max-height: 0;
      padding: 0 24px;
      overflow: hidden;
    }

    /* TOC title and collapse indicator removed — toggle header handles it */

    .toc-module {
      margin-bottom: 16px;
    }

    .toc-module-title {
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--left-pane-text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toc-section {
      margin-left: 16px;
      margin-bottom: 4px;
    }

    .toc-section-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--left-pane-text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .toc-section-link:hover {
      background-color: rgba(22, 216, 102, 0.1);
      color: var(--left-pane-text);
    }

    .toc-section-link.active {
      background-color: rgba(22, 216, 102, 0.15);
      color: var(--green);
      font-weight: 500;
    }

    .toc-section-check {
      display: none;
      color: var(--green);
      font-size: 0.85rem;
    }

    .toc-section-link.completed .toc-section-check {
      display: inline;
    }

    /* TUTORIAL CONTENT */
    .tutorial-content {
      flex: 1;
      overflow-y: auto;
      padding: 48px;
      background-color: var(--left-pane-bg);
      color: var(--left-pane-text);
      font-size: 14px;
    }

    .tutorial-content h3 {
      font-size: 1.3rem;
      color: var(--left-pane-text);
    }

    .tutorial-content h2 {
      color: var(--left-pane-text);
    }

    .tutorial-content p {
      color: var(--left-pane-text-secondary);
      margin-bottom: 1em;
    }

    .tutorial-content ul,
    .tutorial-content ol {
      color: var(--left-pane-text-secondary);
    }

    .tutorial-content strong {
      color: var(--left-pane-text);
    }

    .module-section {
      margin-bottom: 64px;
      scroll-margin-top: 64px;
    }

    .module-divider {
      margin: 80px 0 48px 0;
      padding-top: 48px;
      border-top: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .module-divider-number {
      font-family: var(--font-heading);
      font-size: 3rem;
      font-weight: 800;
      color: var(--green);
      opacity: 0.3;
    }

    .module-divider-text {
      flex: 1;
    }

    .module-divider-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--left-pane-text);
      margin: 0;
    }

    .module-divider-desc {
      font-size: 0.9rem;
      color: var(--left-pane-text-secondary);
      margin: 0;
    }

    .section-title {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--left-pane-text);
      margin-top: 0;
    }

    .section-subtitle {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--left-pane-text);
      margin-top: 0;
    }

    .section-content {
      color: var(--left-pane-text-secondary);
    }

    .section-content p {
      margin-bottom: 1.2em;
    }

    .section-content ul,
    .section-content ol {
      margin: 1.2em 0 1.2em 2em;
    }

    .section-content li {
      margin-bottom: 0.6em;
    }

    .section-content strong {
      color: var(--left-pane-text);
    }

    .section-content a {
      color: var(--green);
    }

    .section-content a:hover {
      text-decoration: underline;
    }

    .video-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: var(--green-glow);
      border: 1px solid var(--green);
      color: var(--green);
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      margin: 24px 0;
      transition: all 0.2s;
    }

    .video-link:hover {
      background-color: var(--green);
      color: var(--bg);
    }

    .video-link-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
    }

    /* RIGHT PANE - VIDEO PLAYER */
    .right-pane {
      flex: 0 0 40%;
      background-color: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-left: 1px solid var(--border);
    }

    .video-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .video-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .video-title {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .video-chapter {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .video-container {
      flex: 1;
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .video-player {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .video-player.active {
      display: block;
    }

    .video-loading {
      position: absolute;
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 50;
    }

    .video-loading.active {
      display: flex;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .video-controls-container {
      background-color: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .video-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .control-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .control-btn:hover {
      color: var(--green);
      background-color: var(--surface-hover);
    }

    .control-btn.active {
      color: var(--green);
    }

    .time-display {
      font-size: 0.85rem;
      color: var(--text-secondary);
      min-width: 80px;
      text-align: right;
      font-family: 'Monaco', monospace;
    }

    .seek-bar {
      flex: 1;
      height: 4px;
      background-color: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      margin: 0 8px;
    }

    .seek-progress {
      height: 100%;
      background-color: var(--green);
      border-radius: 2px;
      pointer-events: none;
    }

    .seek-bar:hover .seek-thumb {
      background-color: var(--green);
      width: 12px;
      height: 12px;
      margin-top: -4px;
    }

    .seek-thumb {
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: transparent;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
      transition: all 0.2s;
      pointer-events: none;
    }

    .seek-bar-chapters {
      display: flex;
      gap: 2px;
      margin-top: 4px;
    }

    .chapter-marker {
      flex: 1;
      height: 3px;
      background-color: var(--border);
      border-radius: 1px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .chapter-marker:hover {
      background-color: var(--text-secondary);
    }

    .chapter-marker.passed {
      background-color: var(--green);
    }

    .playback-speed {
      position: relative;
    }

    .speed-dropdown {
      position: absolute;
      bottom: 100%;
      right: 0;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-width: 100px;
      display: none;
      flex-direction: column;
      z-index: 150;
      margin-bottom: 8px;
    }

    .speed-dropdown.active {
      display: flex;
    }

    .speed-option {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-secondary);
      transition: all 0.2s;
      border-bottom: 1px solid var(--border);
    }

    .speed-option:last-child {
      border-bottom: none;
    }

    .speed-option:hover,
    .speed-option.active {
      background-color: var(--surface-hover);
      color: var(--green);
    }

    .volume-slider {
      width: 100px;
      height: 4px;
      background-color: var(--border);
      border-radius: 2px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .volume-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      background-color: var(--green);
      border-radius: 50%;
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      background-color: var(--green);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 1024px) {
      .content-wrapper {
        flex-direction: column;
      }

      .left-pane {
        flex: 0 0 auto;
        min-height: 0;
        flex: 1;
        overflow-y: auto;
      }

      .right-pane {
        flex: 0 0 60px;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 60px;
        transition: max-height 0.3s;
        z-index: 50;
      }

      .right-pane.expanded {
        max-height: 40vh;
      }

      .video-header {
        display: none;
      }

      .video-header.mobile-show {
        display: block;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }

      .video-container {
        display: none;
      }

      .video-container.mobile-show {
        display: flex;
      }

      .video-controls-container {
        padding: 8px 12px;
        border-top: none;
      }

      .video-controls {
        gap: 8px;
        margin-bottom: 0;
      }

      .control-btn {
        font-size: 1rem;
        padding: 2px 4px;
      }

      .time-display {
        font-size: 0.75rem;
        min-width: 60px;
      }

      .volume-slider {
        display: none;
      }

      .playback-speed {
        display: none;
      }

      .content-wrapper {
        padding-bottom: 60px;
      }

      .right-pane.expanded ~ .left-pane {
        flex: 0;
      }

      /* toc-toggle is already flex on desktop, no override needed */

      .table-of-contents {
        max-height: 200px;
        padding: 16px 24px;
      }

      .tutorial-content {
        padding: 32px 24px;
      }

      nav.top-nav {
        flex-wrap: wrap;
        padding: 12px;
        gap: 8px;
      }

      .nav-logo {
        order: 1;
        flex: 0 1 auto;
      }

      .nav-tracks {
        order: 2;
        width: 100%;
        overflow-x: auto;
        flex-wrap: nowrap;
      }

      .nav-search {
        order: 3;
        width: 100%;
        max-width: none;
        min-width: 0;
      }

      .nav-modules {
        order: 4;
        width: 100%;
        flex-wrap: wrap;
        gap: 6px;
      }
    }

    @media (max-width: 640px) {
      h2 {
        font-size: 1.5rem;
      }

      h3 {
        font-size: 1.25rem;
      }

      nav.top-nav {
        padding: 12px;
      }

      .nav-logo {
        font-size: 1.1rem;
      }

      .module-tab {
        padding: 6px 12px;
        font-size: 0.85rem;
      }

      .nav-progress {
        font-size: 0.8rem;
      }

      .nav-progress-bar {
        width: 80px;
      }

      .tutorial-content {
        padding: 24px 16px;
      }

      .module-divider {
        margin: 60px 0 32px 0;
        gap: 8px;
      }

      .module-divider-number {
        font-size: 2rem;
      }

      .section-title {
        font-size: 1.5rem;
      }

      .search-input {
        font-size: 0.85rem;
        padding: 6px 10px;
      }
    }

    /* UTILITY CLASSES */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* SCROLLBAR STYLING */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);

    ::-webkit-scrollbar-thumb {

    .left-pane ::-webkit-scrollbar-track {

    .left-pane ::-webkit-scrollbar-thumb {
      background: #d0d0d0;
      border-radius: 4px;
    }

    .left-pane ::-webkit-scrollbar-thumb:hover {
      background: #a0a0a0;
    }
  </style>
</head>

              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="3 6 5 6 10 11 10 13 5 18 3 18 3 6"></polygon>
                <path d="M15.54 3.54a9 9 0 0 1 0 12.73M18.91 7.09a5.9 5.9 0 0 1 0 8.36" stroke="currentColor" stroke-width="2" fill="none"/>
              </svg>
            </button>

            <input
              type="range"
              min="0"
              max="100"
              value="100"
              class="volume-slider"
              id="volume-slider"
              title="Volume"

              <button class="control-btn" id="speed-btn" title="Playback Speed">

              <div class="speed-dropdown" id="speed-dropdown">
                <div class="speed-option" data-speed="0.5">0.5x</div>
                <div class="speed-option" data-speed="0.75">0.75x</div>
                <div class="speed-option" data-speed="1" style="font-weight: 600;">1x</div>
                <div class="speed-option" data-speed="1.25">1.25x</div>
                <div class="speed-option" data-speed="1.5">1.5x</div>

              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  <!-- LOAD TUTORIAL CONTENT DATA -->
  <script src="js/tutorial-content.js"></script>
  <script src="js/expanded-content.js"></script>

  <!-- MAIN APP JAVASCRIPT -->
  <script>
    // ===== STATE MANAGEMENT =====
    const state = {
      currentTrack: 'basics',
      currentModule: 1,
      currentVideo: null,
      currentTime: 0,
      completedSections: new Set(),
      scrolling: false,
      mobilePlayerExpanded: false,
      isMobile: () => window.innerWidth < 1024,
    };

    // ===== STORAGE HELPERS =====
    const Storage = {
      save() {
        const data = {
          completedSections: Array.from(state.completedSections),
          timestamp: Date.now(),
        };
        localStorage.setItem('openart-tutorial-progress', JSON.stringify(data));
      },
      load() {
        const data = localStorage.getItem('openart-tutorial-progress');
        if (data) {
          try {
            const parsed = JSON.parse(data);
            state.completedSections = new Set(parsed.completedSections);
          } catch (e) {
            console.error('Failed to load progress:', e);
          }
        }
      },
    };

    // ===== TRACK DATA MAPPING =====
    const trackMapping = {
      basics: {
        modules: () => window.TUTORIAL_CONTENT.modules,
        titles: ['From Idea to Reality', 'Transform With Emotion', 'Advanced Techniques', 'Mastering Quality']
      },
      'suite-ui': {
        modules: () => {
          if (window.EXPANDED_TRACKS && window.EXPANDED_TRACKS.tracks) {
            const track = window.EXPANDED_TRACKS.tracks.find(t => t.id === 'suite-ui');
            return track ? track.modules : [];
          }
          return [];
        },
        titles: ['OpenArt Suite']
      },
      'deep-dives': {
        modules: () => {
          if (window.EXPANDED_TRACKS && window.EXPANDED_TRACKS.tracks) {
            const track = window.EXPANDED_TRACKS.tracks.find(t => t.id === 'deep-dives');
            return track ? track.modules : [];
          }
          return [];
        },
        titles: ['Start & End Frame', 'One-Click Story', 'Worlds', 'Motion Control', 'Seamless Loops']
      },
      'use-cases': {
        modules: () => {
          if (window.EXPANDED_TRACKS && window.EXPANDED_TRACKS.tracks) {
            const track = window.EXPANDED_TRACKS.tracks.find(t => t.id === 'use-cases');
            return track ? track.modules : [];
          }
          return [];
        },
        titles: ['AI Influencer', 'AI Movie', 'Music Video', 'Animated Cartoon']
      }
    };

    function getTrackModules(trackId) {
      const track = trackMapping[trackId];
      return track ? track.modules() : [];
    }

    function getModuleTitle(trackId, moduleIndex) {
      const track = trackMapping[trackId];
      if (!track || !track.titles) return `Module ${moduleIndex + 1}`;
      return track.titles[moduleIndex] || `Module ${moduleIndex + 1}`;
    }

    // ===== UTILITY FUNCTIONS =====
    function formatTime(seconds) {
      if (!isFinite(seconds)) return '0:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) {
        return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function highlightMatch(text, query) {
      const regex = new RegExp(`(${query})`, 'gi');
      return text.replace(regex, '<span class="match">$1</span>');
    }

    function getSnippet(text, query, length = 150) {
      const lowerText = text.toLowerCase();
      const lowerQuery = query.toLowerCase();
      const index = lowerText.indexOf(lowerQuery);

      if (index === -1) return text.substring(0, length) + '...';

      const start = Math.max(0, index - 50);
      const end = Math.min(text.length, index + query.length + 100);
      const snippet = text.substring(start, end);

      return (start > 0 ? '...' : '') +
             highlightMatch(snippet, query) +
             (end < text.length ? '...' : '');
    }

    function debounce(func, delay) {
      let timeoutId;
      return function (...args) {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => func(...args), delay);
      };
    }

    // ===== VIDEO PLAYER SETUP =====
    function setupVideoPlayer() {
      const player = document.getElementById('video-player');
      const playBtn = document.getElementById('play-btn');
      const seekBar = document.getElementById('seek-bar');
      const seekProgress = document.getElementById('seek-progress');
      const seekThumb = document.getElementById('seek-thumb');
      const timeDisplay = document.getElementById('time-display');
      const volumeSlider = document.getElementById('volume-slider');
      const speedBtn = document.getElementById('speed-btn');
      const speedDropdown = document.getElementById('speed-dropdown');
      const speedOptions = speedDropdown.querySelectorAll('.speed-option');
      const fullscreenBtn = document.getElementById('fullscreen-btn');
      const chaptersBar = document.getElementById('chapters-bar');

      // Load first module video
      loadVideo(1);

      // Play/Pause button
      playBtn.addEventListener('click', () => {
        if (player.paused) {
          player.play();
          updatePlayBtn();
        } else {
          player.pause();
          updatePlayBtn();
        }
      });

      // Update play button icon
      function updatePlayBtn() {
        const isPlaying = !player.paused;
        playBtn.innerHTML = isPlaying
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
      }

      player.addEventListener('play', updatePlayBtn);
      player.addEventListener('pause', updatePlayBtn);

      // Time update
      player.addEventListener('timeupdate', () => {
        const duration = player.duration || 0;
        const percent = (player.currentTime / duration) * 100;
        seekProgress.style.width = percent + '%';

        // Position thumb
        const barWidth = seekBar.offsetWidth;
        const thumbPos = (player.currentTime / duration) * barWidth - 4;
        seekThumb.style.left = Math.max(0, Math.min(thumbPos, barWidth - 8)) + 'px';

        timeDisplay.textContent = formatTime(player.currentTime) + ' / ' + formatTime(duration);
        updateChaptersBar();
      });

      // Metadata loaded
      player.addEventListener('loadedmetadata', () => {
        timeDisplay.textContent = '0:00 / ' + formatTime(player.duration);
        updateChaptersBar();
      });

      // Seek bar interaction
      seekBar.addEventListener('click', (e) => {
        const rect = seekBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        player.currentTime = percent * player.duration;
      });

      // Volume
      volumeSlider.addEventListener('input', (e) => {
        player.volume = e.target.value / 100;
      });

      // Playback speed
      speedBtn.addEventListener('click', () => {
        speedDropdown.classList.toggle('active');
      });

      speedOptions.forEach(option => {
        option.addEventListener('click', (e) => {
          const speed = parseFloat(e.target.dataset.speed);
          player.playbackRate = speed;
          speedOptions.forEach(opt => opt.classList.remove('active'));
          e.target.classList.add('active');
          speedBtn.innerHTML = `<span style="font-size: 0.85rem; font-weight: 600;">${speed}x</span>`;
          speedDropdown.classList.remove('active');
        });
      });

      // Fullscreen
      fullscreenBtn.addEventListener('click', () => {
        if (player.requestFullscreen) {
          player.requestFullscreen();
        } else if (player.webkitRequestFullscreen) {
          player.webkitRequestFullscreen();
        }
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ' && player === document.activeElement) {
          e.preventDefault();
          player.paused ? player.play() : player.pause();
        }
        if (e.key === 'f') {
          fullscreenBtn.click();
        }
      });

      // Update play button on load
      updatePlayBtn();

      // Set initial speed
      speedOptions[2].classList.add('active');

      function updateChaptersBar() {
        if (!state.currentVideo) return;
        const modules = getTrackModules(state.currentTrack);
        const module = modules[state.currentVideo - 1];
        if (!module) return;

        chaptersBar.innerHTML = '';

        module.sections.forEach(section => {
          const marker = document.createElement('div');
          marker.className = 'chapter-marker';
          const sectionEnd = section.timeStart;
          const nextSection = module.sections[module.sections.indexOf(section) + 1];
          const nextTime = nextSection ? nextSection.timeStart : player.duration;

          if (player.currentTime >= sectionEnd) {
            marker.classList.add('passed');
          }

          marker.addEventListener('click', () => {
            player.currentTime = sectionEnd;
          });

          chaptersBar.appendChild(marker);
        });
      }
    }

    function loadVideo(moduleNum) {
      const modules = getTrackModules(state.currentTrack);
      const module = modules[moduleNum - 1];
      if (!module) return;

      const player = document.getElementById('video-player');
      const videoLoading = document.getElementById('video-loading');

      state.currentVideo = moduleNum;

      videoLoading.classList.add('active');
      player.src = module.videoFile;

      player.addEventListener('canplay', () => {
        videoLoading.classList.remove('active');
      }, { once: true });

      updateVideoHeader(moduleNum, 0);
    }

    function updateVideoHeader(moduleNum, sectionIndex = 0) {
      const modules = getTrackModules(state.currentTrack);
      const module = modules[moduleNum - 1];
      if (!module) return;

      const section = module.sections[sectionIndex];
      const videoTitle = document.getElementById('video-title');
      const videoChapter = document.getElementById('video-chapter');

      videoTitle.textContent = `Module ${moduleNum}: ${getModuleTitle(state.currentTrack, moduleNum - 1)}`;
      videoChapter.textContent = section ? section.title : 'Select a section';
    }

    // ===== TABLE OF CONTENTS =====
    function renderTableOfContents() {
      const toc = document.getElementById('table-of-contents');

      toc.innerHTML = '';

      const currentModule = state.currentModule;
      const modules = getTrackModules(state.currentTrack);
      const module = modules[currentModule - 1];
      if (!module) return;

      const moduleName = document.createElement('div');
      moduleName.className = 'toc-module';

      const moduleTitle = document.createElement('div');
      moduleTitle.className = 'toc-module-title';

      const moduleNum = currentModule;
      const completedCount = module.sections.filter(s => state.completedSections.has(s.id)).length;
      const totalCount = module.sections.length;

      moduleTitle.innerHTML = `<span>Module ${moduleNum}</span>`;

      moduleName.appendChild(moduleTitle);

      module.sections.forEach((section, sectionIndex) => {
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'toc-section';

        const sectionLink = document.createElement('div');
        sectionLink.className = 'toc-section-link';
        if (state.completedSections.has(section.id)) {
          sectionLink.classList.add('completed');
        }

        const checkmark = document.createElement('span');
        checkmark.className = 'toc-section-check';
        checkmark.innerHTML = '✓';

        const sectionNumber = document.createTextNode(`${moduleNum}.${sectionIndex + 1} ${section.title}`);

        sectionLink.appendChild(checkmark);
        sectionLink.appendChild(sectionNumber);

        sectionLink.addEventListener('click', () => {
          const element = document.getElementById(section.id);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Close ToC on mobile
            if (state.isMobile()) {
              document.getElementById('table-of-contents').classList.add('collapsed');
              updateCollapseIndicator(true);
            }
          }
        });

        sectionDiv.appendChild(sectionLink);
        moduleName.appendChild(sectionDiv);
      });

      toc.appendChild(moduleName);
    }

    function updateCollapseIndicator(isCollapsed) {
      let indicator = document.getElementById('toc-collapse-indicator');
      if (!indicator) {
        indicator = document.createElement('button');
        indicator.id = 'toc-collapse-indicator';
        indicator.className = 'toc-collapse-indicator';
        indicator.title = 'Show Contents';
        indicator.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        `;
        indicator.addEventListener('click', () => {
          const toc = document.getElementById('table-of-contents');
          toc.classList.remove('collapsed');
          indicator.classList.remove('visible');
        });
        document.body.appendChild(indicator);
      }

      if (isCollapsed) {
        indicator.classList.add('visible');
      } else {
        indicator.classList.remove('visible');
      }
    }

    // ===== RENDER TUTORIAL CONTENT =====
    function renderTutorialContent(moduleNum) {
      const content = document.getElementById('tutorial-content');
      content.innerHTML = '';

      const modules = getTrackModules(state.currentTrack);
      const module = modules[moduleNum - 1];
      if (!module) return;

      // Add module title
      const moduleTitle = document.createElement('h2');
      moduleTitle.className = 'section-title';
      moduleTitle.style.marginTop = '0';
      moduleTitle.textContent = module.title;
      content.appendChild(moduleTitle);

      // Add module description
      const moduleDesc = document.createElement('p');
      moduleDesc.className = 'section-content';
      moduleDesc.textContent = module.description;
      content.appendChild(moduleDesc);

      // Render sections for current module
      module.sections.forEach((section, sectionIndex) => {
        const sectionDiv = document.createElement('section');
        sectionDiv.id = section.id;
        sectionDiv.className = 'module-section';

        const sectionNumber = `${moduleNum}.${sectionIndex + 1}`;
        const title = document.createElement('h3');
        title.className = 'section-subtitle';
        title.textContent = `${sectionNumber} ${section.title}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'section-content';

        // Remove broken first video link from section content
        let cleanContent = section.content;
        // Remove the first <a> tag with class video-link
        cleanContent = cleanContent.replace(/<a[^>]*class="video-link"[^>]*>.*?<\/a>\s*/i, '');

        contentDiv.innerHTML = cleanContent;

        // Add video link right after heading
        const videoLink = document.createElement('a');
        videoLink.className = 'video-link';
        videoLink.dataset.module = moduleNum;
        videoLink.dataset.sectionIndex = sectionIndex;
        videoLink.dataset.time = section.timeStart;
        videoLink.textContent = `▶ Watch (${formatTime(section.timeStart)})`;

        videoLink.addEventListener('click', (e) => {
          e.preventDefault();
          playSection(moduleNum, sectionIndex);
        });

        sectionDiv.appendChild(title);
        sectionDiv.appendChild(videoLink);
        sectionDiv.appendChild(contentDiv);

        content.appendChild(sectionDiv);
      });
    }

    // ===== VIDEO INTERACTION =====
    function playSection(moduleNum, sectionIndex) {
      const modules = getTrackModules(state.currentTrack);
      const module = modules[moduleNum - 1];
      if (!module) return;

      const section = module.sections[sectionIndex];
      const player = document.getElementById('video-player');

      // Switch video if needed
      if (state.currentVideo !== moduleNum) {
        loadVideo(moduleNum);
      }

      // Wait for metadata and seek
      const seekHandler = () => {
        player.currentTime = section.timeStart;
        player.play();
        updateVideoHeader(moduleNum, sectionIndex);
      };

      if (player.readyState >= 1) {
        seekHandler();
      } else {
        player.addEventListener('loadedmetadata', seekHandler, { once: true });
      }

      // On mobile, expand player
      if (state.isMobile()) {
        expandMobilePlayer();
      }
    }

    // ===== SCROLL SPY & PROGRESS TRACKING =====
    function setupScrollSpy() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const id = entry.target.id;

          // Track completion
          if (entry.isIntersecting && entry.intersectionRatio >= 0.7) {
            if (!state.completedSections.has(id)) {
              state.completedSections.add(id);
              Storage.save();
              updateProgress();
              updateTableOfContents();
            }
          }

          // Highlight in ToC
          if (entry.isIntersecting) {
            document.querySelectorAll('.toc-section-link').forEach(link => {
              link.classList.remove('active');
            });
            const linkText = entry.target.querySelector('.section-subtitle')?.textContent;
            if (linkText) {
              document.querySelectorAll('.toc-section-link').forEach(link => {
                if (link.textContent.trim().endsWith(entry.target.querySelector('.section-subtitle').textContent.trim())) {
                  link.classList.add('active');
                }
              });
            }
          }
        });
      }, { threshold: [0.7] });

      document.querySelectorAll('[id^="m"]').forEach(section => {
        observer.observe(section);
      });
    }

    // ===== PROGRESS TRACKING =====
    function updateProgress() {
      // Calculate progress across all modules in all tracks
      let totalSections = 0;
      Object.keys(trackMapping).forEach(trackId => {
        const modules = getTrackModules(trackId);
        totalSections += modules.reduce((sum, m) => sum + m.sections.length, 0);
      });

      const completedCount = state.completedSections.size;

      // Update nav progress
      document.getElementById('progress-text').textContent = `${completedCount}/${totalSections}`;
      document.getElementById('progress-bar').style.width = (completedCount / totalSections) * 100 + '%';
    }

    function updateTableOfContents() {
      document.querySelectorAll('.toc-section-link').forEach(link => {
        const text = link.textContent.trim();
        const sectionId = Array.from(document.querySelectorAll('[id^="m"]')).find(el => {
          const subtitle = el.querySelector('.section-subtitle');
          return subtitle && subtitle.textContent.includes(text);
        })?.id;

        if (sectionId && state.completedSections.has(sectionId)) {
          link.classList.add('completed');
        } else if (sectionId) {
          link.classList.remove('completed');
        }
      });
    }

    // ===== SEARCH FUNCTIONALITY =====
    function setupSearch() {
      const searchInput = document.getElementById('search-input');
      const searchResults = document.getElementById('search-results');

      const performSearch = debounce((query) => {
        if (!query.trim()) {
          searchResults.classList.remove('active');
          return;
        }

        const results = [];

        // Search in all tracks
        Object.keys(trackMapping).forEach(trackId => {
          const modules = getTrackModules(trackId);
          modules.forEach((module, moduleIndex) => {
            module.sections.forEach((section, sectionIndex) => {
              const content = section.title + ' ' + section.content;
              if (content.toLowerCase().includes(query.toLowerCase())) {
                results.push({
                  trackId: trackId,
                  trackName: trackId.replace('-', ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '),
                  moduleNum: moduleIndex + 1,
                  moduleName: module.title,
                  sectionId: section.id,
                  sectionTitle: section.title,
                  sectionNumber: `${moduleIndex + 1}.${sectionIndex + 1}`,
                  content: content,
                });
              }
            });
          });
        });

        // Render results
        searchResults.innerHTML = '';
        if (results.length === 0) {
          searchResults.innerHTML = '<div style="padding: 16px; text-align: center; color: var(--text-muted);">No results found</div>';
        } else {
          results.slice(0, 10).forEach(result => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            item.innerHTML = `
              <div class="search-result-module">${result.trackName} • Module ${result.moduleNum}</div>
              <div class="search-result-title">${result.sectionNumber} ${result.sectionTitle}</div>
              <div class="search-result-snippet">${getSnippet(result.content, query)}</div>
            `;
            item.addEventListener('click', () => {
              // Switch to the track and module
              if (state.currentTrack !== result.trackId) {
                switchTrack(result.trackId);
              }
              if (state.currentModule !== result.moduleNum) {
                state.currentModule = result.moduleNum;
                switchModule(result.moduleNum);
              }

              const section = document.getElementById(result.sectionId);
              if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                searchResults.classList.remove('active');
                searchInput.value = '';
              }
            });
            searchResults.appendChild(item);
          });
        }

        searchResults.classList.add('active');
      }, 300);

      searchInput.addEventListener('input', (e) => {
        performSearch(e.target.value);
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          searchResults.classList.remove('active');
        }
      });

      searchResults.addEventListener('click', (e) => {
        if (!e.target.closest('.search-result-item')) {
          searchResults.classList.remove('active');
        }
      });
    }

    // ===== TRACK NAVIGATION =====
    function setupTrackTabs() {
      document.querySelectorAll('.track-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const trackId = tab.dataset.track;
          switchTrack(trackId);
        });
      });
    }

    function switchTrack(trackId) {
      state.currentTrack = trackId;

      // Update active track button
      document.querySelectorAll('.track-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`.track-tab[data-track="${trackId}"]`).classList.add('active');

      // Regenerate module tabs
      regenerateModuleTabs();

      // Switch to module 1 of new track
      state.currentModule = 1;
      switchModule(1);
    }

    function regenerateModuleTabs() {
      const navModules = document.getElementById('nav-modules');
      const modules = getTrackModules(state.currentTrack);

      navModules.innerHTML = '';
      modules.forEach((module, index) => {
        const tab = document.createElement('button');
        tab.className = 'module-tab';
        if (index === 0) tab.classList.add('active');
        tab.dataset.module = (index + 1).toString();
        tab.textContent = getModuleTitle(state.currentTrack, index);

        tab.addEventListener('click', () => {
          state.currentModule = index + 1;
          switchModule(index + 1);
        });

        navModules.appendChild(tab);
      });
    }

    // ===== MODULE TAB NAVIGATION =====
    function setupModuleTabs() {
      // Initial generation
      regenerateModuleTabs();
    }

    function switchModule(moduleNum) {
      // Update active tab
      document.querySelectorAll('.module-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`.module-tab[data-module="${moduleNum}"]`)?.classList.add('active');

      // Render new content
      renderTutorialContent(moduleNum);
      renderTableOfContents();

      // Load video for this module
      loadVideo(moduleNum);

      // Scroll to top
      document.getElementById('tutorial-content').scrollTop = 0;

      // Re-setup scroll spy for new content
      setupScrollSpy();
    }

    // ===== MOBILE PLAYER =====
    function setupMobilePlayer() {
      const player = document.getElementById('video-player');
      const rightPane = document.getElementById('right-pane');
      const playBtn = document.getElementById('play-btn');
      const videoHeader = document.getElementById('video-header');
      const videoContainer = rightPane.querySelector('.video-container');

      // TOC toggle works on both desktop and mobile
      const tocToggle = document.getElementById('toc-toggle');
      tocToggle.addEventListener('click', () => {
        const toc = document.getElementById('table-of-contents');
        toc.classList.toggle('collapsed');
        tocToggle.classList.toggle('collapsed');
      });

      if (state.isMobile()) {
        // Setup mobile collapse/expand
        playBtn.addEventListener('click', () => {
          if (rightPane.classList.contains('expanded')) {
            collapseMobilePlayer();
          }
        });
      }
    }

    function expandMobilePlayer() {
      if (!state.isMobile()) return;
      const rightPane = document.getElementById('right-pane');
      const videoHeader = document.getElementById('video-header');
      const videoContainer = rightPane.querySelector('.video-container');
      rightPane.classList.add('expanded');
      videoHeader.classList.add('mobile-show');
      videoContainer.classList.add('mobile-show');
    }

    function collapseMobilePlayer() {
      if (!state.isMobile()) return;
      const rightPane = document.getElementById('right-pane');
      const videoHeader = document.getElementById('video-header');
      const videoContainer = rightPane.querySelector('.video-container');
      rightPane.classList.remove('expanded');
      videoHeader.classList.remove('mobile-show');
      videoContainer.classList.remove('mobile-show');
    }

    // ===== INITIALIZATION =====
    function initialize() {
      // Load progress
      Storage.load();

      // Setup track tabs first
      setupTrackTabs();

      // Render content for current module
      state.currentModule = 1;
      renderTutorialContent(1);
      renderTableOfContents();
      updateProgress();

      // Setup features
      setupVideoPlayer();
      setupScrollSpy();
      setupSearch();
      setupModuleTabs();
      setupMobilePlayer();

      // Handle window resize
      window.addEventListener('resize', () => {
        // Recalculate layouts on resize
      });

      console.log('OpenArt JumpStart tutorial loaded');
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initialize);
    } else {
      initialize();
    }
  </script>
</body>
</html>
